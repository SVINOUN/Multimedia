<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voz a Texto</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #f4f7f6; }
    h2 { text-align: center; color: #2c3e50; }
    #result-area {
      width: 100%; height: 200px; padding: 15px;
      border: 2px solid #3498db; border-radius: 10px;
      background: white; font-size: 18px; box-sizing: border-box;
      margin-bottom: 20px; overflow-y: auto;
    }
    .controls { display: flex; gap: 10px; justify-content: center; }
    button {
      padding: 12px 25px; font-size: 16px; border: none;
      border-radius: 5px; cursor: pointer; color: white;
    }
    #btn-start { background: #27ae60; }
    #btn-stop { background: #e74c3c; }
    #status { text-align: center; margin-top: 10px; color: #7f8c8d; font-style: italic; }
  </style>
</head>
<body>

  <h2>🎙️ Dictado por Voz</h2>
  
  <div id="result-area" placeholder="Tu dictado aparecerá aquí..."></div>
  
  <div class="controls">
    <button id="btn-start" onclick="startRecognition()">🎤 Empezar a Escuchar</button>
    <button id="btn-stop" onclick="stopRecognition()">🛑 Detener</button>
  </div>

  <div id="status">Presiona el botón para hablar...</div>

  <script>
    // 1. Configuración de compatibilidad 
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
      alert("Lo siento, tu navegador no soporta el reconocimiento de voz.");
    }

    const recognition = new SpeechRecognition();
    const resultArea = document.getElementById('result-area');
    const statusText = document.getElementById('status');

    // 2. Ajustes del reconocimiento
    recognition.lang = 'es-ES'; // Idioma: Español
    recognition.continuous = true; // Seguir escuchando aunque se pause
    recognition.interimResults = true; // Mostrar resultados parciales mientras hablas

    // 3. Evento cuando recibe resultados
    recognition.onresult = (event) => {
      let textoFinal = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        textoFinal += event.results[i][0].transcript;
      }
      resultArea.innerText = textoFinal;
    };

    // 4. Manejo de estados
    recognition.onstart = () => {
      statusText.innerHTML = "🔴 Escuchando... Habla ahora.";
      statusText.style.color = "red";
    };

    recognition.onend = () => {
      statusText.innerHTML = "⚪ Microfóno apagado.";
      statusText.style.color = "#7f8c8d";
    };

    recognition.onerror = (event) => {
      statusText.innerHTML = `❌ Error: ${event.error}`;
    };

    // Funciones de los botones
    function startRecognition() {
      recognition.start();
    }

    function stopRecognition() {
      recognition.stop();
    }
  </script>

</body>
</html>
